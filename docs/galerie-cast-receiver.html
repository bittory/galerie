
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>GALERIE Cast Receiver</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width:100%; height:100%; background:#0d0c09; overflow:hidden; font-family:'Malgun Gothic','맑은 고딕',system-ui,sans-serif; }
    #bg-blur { position:fixed; inset:0; z-index:0; background-size:cover; background-position:center; filter:blur(60px) saturate(1.4) brightness(0.5); transform:scale(1.12); opacity:0; transition:opacity 1.0s ease; }
    #bg-image { position:fixed; inset:0; z-index:1; background-size:contain; background-position:center; background-repeat:no-repeat; opacity:0; transition:opacity 1.0s ease; }
    #bg-overlay { position:fixed; inset:0; z-index:2; background:transparent; }
    #artwork-info { position:fixed; bottom:60px; left:72px; z-index:10; opacity:0; transform:translateY(20px); transition:opacity 0.8s ease,transform 0.8s ease; }
    #artwork-info.visible { opacity:1; transform:translateY(0); }
    #art-badge { display:none; }
    #art-title {
      font-size:clamp(22px,2.2vw,32px); font-weight:300; color:#f5f0e8; letter-spacing:1px; line-height:1.2; margin-bottom:10px;
      text-shadow:
        0 0 6px rgba(0,0,0,1), 0 0 14px rgba(0,0,0,0.9), 0 0 28px rgba(0,0,0,0.7),
        -1px -1px 0 rgba(0,0,0,0.6), 1px -1px 0 rgba(0,0,0,0.6),
        -1px 1px 0 rgba(0,0,0,0.6), 1px 1px 0 rgba(0,0,0,0.6);
    }
    #art-artist {
      font-size:18px; color:#e8c97a; font-style:italic; margin-bottom:6px;
      text-shadow:
        0 0 6px rgba(0,0,0,1), 0 0 14px rgba(0,0,0,0.9), 0 0 24px rgba(0,0,0,0.7),
        -1px -1px 0 rgba(0,0,0,0.5), 1px 1px 0 rgba(0,0,0,0.5);
    }
    #art-meta {
      font-size:13px; color:rgba(255,255,255,0.9); letter-spacing:2px;
      text-shadow:
        0 0 5px rgba(0,0,0,1), 0 0 12px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.7),
        -1px -1px 0 rgba(0,0,0,0.5), 1px 1px 0 rgba(0,0,0,0.5);
    }
    #watermark { position:fixed; top:40px; right:56px; z-index:10; text-align:right; opacity:0; transition:opacity 0.8s ease; }
    #watermark-title { font-size:20px; letter-spacing:8px; color:rgba(245,240,232,0.9); text-shadow:0 0 8px rgba(0,0,0,0.9),0 0 20px rgba(0,0,0,0.7); }
    #watermark-sub { font-size:10px; letter-spacing:5px; color:rgba(201,168,76,0.7); margin-top:2px; text-shadow:0 0 6px rgba(0,0,0,0.9); }
    #loading { position:fixed; inset:0; z-index:100; background:#0d0c09; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; transition:opacity 0.6s ease; }
    #loading.hidden { opacity:0; pointer-events:none; }
    #loading-title { font-size:32px; letter-spacing:12px; color:#c9a84c; }
    #loading-sub { font-size:12px; letter-spacing:5px; color:rgba(245,240,232,0.35); }
    #loading-bar-wrap { width:200px; height:1px; background:rgba(255,255,255,0.1); }
    #loading-bar { height:100%; background:#c9a84c; width:0; animation:loadAnim 2s ease forwards; }
    @keyframes loadAnim { 0%{width:0} 60%{width:70%} 100%{width:100%} }
  </style>
</head>
<body>
<div id="loading">
  <div id="loading-title">GALERIE</div>
  <div id="loading-sub">MASTERPIECE GALLERY</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>
<div id="bg-blur"></div>
<div id="bg-image"></div>
<div id="bg-overlay"></div>
<div id="watermark">
  <div id="watermark-title">GALERIE</div>
  <div id="watermark-sub">MASTERPIECE GALLERY</div>
</div>
<div id="artwork-info">
  <div id="art-badge"></div>
  <div id="art-title">별이 빛나는 밤</div>
  <div id="art-artist">Vincent van Gogh</div>
  <div id="art-meta">1889 · 포스트 인상주의 · 네덜란드</div>
</div>
<script>
const MAX_W = 3840, MAX_H = 2160;
function limitTo4K(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.referrerPolicy = 'no-referrer';
    img.onload = () => {
      if (img.naturalWidth <= MAX_W && img.naturalHeight <= MAX_H) { resolve(url); return; }
      const ratio = Math.min(MAX_W / img.naturalWidth, MAX_H / img.naturalHeight);
      const w = Math.round(img.naturalWidth * ratio);
      const h = Math.round(img.naturalHeight * ratio);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.92));
    };
    img.onerror = () => resolve(url);
    img.src = url;
  });
}
const context = cast.framework.CastReceiverContext.getInstance();
const playerMgr = context.getPlayerManager();
const NAMESPACE = 'urn:x-cast:com.galerie.artwork';
context.addCustomMessageListener(NAMESPACE, (event) => {
  if (event.data && event.data.type === 'ARTWORK') displayArtwork(event.data);
});
playerMgr.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, (request) => {
  const custom = request.media && request.media.customData;
  if (custom && custom.title) setTimeout(() => displayArtwork(custom), 400);
  return request;
});
function displayArtwork(data) {
  const bgBlur  = document.getElementById('bg-blur');
  const bgImage = document.getElementById('bg-image');
  const info    = document.getElementById('artwork-info');
  const imgUrl  = data.url || data.imageUrl || '';
  if (!imgUrl) return;
  info.classList.remove('visible');
  bgBlur.style.transition  = 'opacity 0.35s ease';
  bgImage.style.transition = 'opacity 0.35s ease';
  bgBlur.style.opacity  = 0;
  bgImage.style.opacity = 0;
  limitTo4K(imgUrl).then(finalUrl => {
    setTimeout(() => {
      bgBlur.style.backgroundImage  = `url(${finalUrl})`;
      bgImage.style.backgroundImage = `url(${finalUrl})`;
      bgBlur.style.transition  = 'opacity 1.0s ease';
      bgImage.style.transition = 'opacity 1.0s ease';
      bgBlur.style.opacity  = 1;
      bgImage.style.opacity = 1;
      document.getElementById('art-title').textContent  = data.title  || '';
      document.getElementById('art-artist').textContent = data.artist || '';
      const year = data.year && data.year > 0 ? data.year : '연도미상';
      document.getElementById('art-meta').textContent =
        year + (data.movement ? ' · ' + data.movement : '') + (data.origin ? ' · ' + data.origin : '');
      setTimeout(() => info.classList.add('visible'), 400);

      // 워터마크: 이미지 로드 후 표시 → 3초 후 fade out
      const wm = document.getElementById('watermark');
      if (wm) {
        clearTimeout(wm._fadeTimer);
        wm.style.transition = 'opacity 0.8s ease';
        wm.style.opacity = '1';
        wm._fadeTimer = setTimeout(() => { wm.style.opacity = '0'; }, 3000);
      }
    }, 370);
  });
}
setTimeout(() => document.getElementById('loading').classList.add('hidden'), 2200);
context.start({ disableIdleTimeout: true, touchScreenOptimizedApp: false });
</script>
</body>
</html>
